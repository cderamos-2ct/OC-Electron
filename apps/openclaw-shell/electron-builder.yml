appId: com.aegilume.shell
productName: Aegilume
protocols:
  - name: Aegilume
    schemes:
      - aegilume
directories:
  buildResources: assets
  output: release
files:
  - out/**/*
  - "!node_modules/**/*"
asarUnpack:
  - "node_modules/pg/**/*"
  - "node_modules/pg-native/**/*"
extraResources:
  - from: ../../packages/openclaw-core/dist
    to: packages/openclaw-core
    filter:
      - "**/*"
  - from: ../../packages/openclaw-db/dist
    to: packages/openclaw-db
    filter:
      - "**/*"
  # ── Bundled service binaries (Sprint 1-3) ──────────────────────────────────
  - from: vendor/postgres/bin
    to: postgres/bin
    filter:
      - initdb
      - pg_ctl
      - postgres
      - pg_isready
      - createdb
      - createuser
      - psql
  - from: vendor/postgres/lib
    to: postgres/lib
    filter:
      - "**/*"
  - from: vendor/postgres/share
    to: postgres/share
    filter:
      - "**/*"
  - from: vendor/vaultwarden
    to: vaultwarden
    filter:
      - "**/*"
  - from: vendor/bw
    to: bw
    filter:
      - "**/*"
  - from: vendor/gws
    to: gws
    filter:
      - "**/*"
  - from: ../../dashboard/.next/standalone
    to: dashboard
    filter:
      - "**/*"
  - from: vendor/code-server
    to: code-server
    filter:
      - "**/*"

# ── macOS ────────────────────────────────────────────────────────────────────
afterSign: scripts/notarize.mjs

mac:
  icon: assets/icons/icon.icns
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  darkModeSupport: true
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist

dmg:
  title: Aegilume
  artifactName: "Aegilume-${version}-mac-${arch}.${ext}"

# ── Windows ──────────────────────────────────────────────────────────────────
win:
  icon: assets/icons/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: assets/icons/icon.ico
  uninstallerIcon: assets/icons/icon.ico
  artifactName: "Aegilume-${version}-win-${arch}.${ext}"

# Windows build targets
# electron-builder reads win targets from the "build" key in package.json or
# directly under the platform key; we list them here as a top-level override.
# Run: electron-builder --win nsis --x64 --arm64
# (arm64 NSIS requires a Windows arm64 runner or cross-compile support)

# ── Linux ────────────────────────────────────────────────────────────────────
linux:
  icon: assets/icons/icon.png
  category: Productivity
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
  artifactName: "Aegilume-${version}-linux-${arch}.${ext}"

# ── Publish (GitHub Releases) ─────────────────────────────────────────────────
publish:
  provider: github
  owner: aegilume
  repo: shell
