name: CI

on:
  pull_request:
    paths:
      - 'apps/openclaw-shell/**'
  push:
    branches:
      - main
    paths:
      - 'apps/openclaw-shell/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace dependencies
        run: pnpm --filter "@openclaw/core" --filter "openclaw-db" build

      - name: Type check
        run: cd apps/openclaw-shell && npx tsc --noEmit

      - name: Unit tests
        run: cd apps/openclaw-shell && npx vitest run

      - name: Build
        run: cd apps/openclaw-shell && npx electron-vite build
