name: Release Shell

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      draft:
        type: boolean
        default: true
        description: 'Create as draft release'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: mac
          - os: windows-2022
            platform: win
          - os: ubuntu-22.04
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace dependencies
        run: pnpm --filter "@openclaw/core" --filter "openclaw-db" build

      - name: Build renderer + main
        run: cd apps/openclaw-shell && npx electron-vite build

      - name: Package — macOS
        if: matrix.platform == 'mac'
        env:
          CSC_LINK: ${{ secrets.MAC_CERT_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: cd apps/openclaw-shell && npx electron-builder --mac --arm64 --x64

      - name: Package — Windows
        if: matrix.platform == 'win'
        env:
          CSC_LINK: ${{ secrets.WIN_CERT_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
        run: cd apps/openclaw-shell && npx electron-builder --win --x64

      - name: Package — Linux
        if: matrix.platform == 'linux'
        run: cd apps/openclaw-shell && npx electron-builder --linux --x64 --arm64

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: apps/openclaw-shell/release/*
          retention-days: 30

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          draft: ${{ github.event.inputs.draft || true }}
          files: artifacts/**/*
          generate_release_notes: true
