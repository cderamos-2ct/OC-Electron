<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <filter id="gold-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="white-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="#0f172a" />

  <!-- Orbital Path -->
  <circle cx="512" cy="512" r="384" fill="none" stroke="#f1f5f9" stroke-width="1.5" stroke-opacity="0.2" />

  <!-- Core Connections (Thin white luminous arcs) -->
  <g stroke="#f1f5f9" stroke-width="1" stroke-opacity="0.3">
    <line x1="512" y1="512" x2="658.9" y2="157.2" />
    <line x1="512" y1="512" x2="866.8" y2="365.1" />
    <line x1="512" y1="512" x2="866.8" y2="658.9" />
    <line x1="512" y1="512" x2="658.9" y2="866.8" />
    <line x1="512" y1="512" x2="365.1" y2="866.8" />
    <line x1="512" y1="512" x2="157.2" y2="658.9" />
    <line x1="512" y1="512" x2="157.2" y2="365.1" />
    <line x1="512" y1="512" x2="365.1" y2="157.2" />
  </g>

  <!-- Shield/Temple Shape (White arcs) -->
  <g stroke="#f1f5f9" stroke-width="2" stroke-opacity="0.75" fill="none">
    <!-- Outer Shield Boundary (Nodes 15, 1, 5, 8, 11) -->
    <polygon points="365.1,157.2 658.9,157.2 866.8,658.9 512,896 157.2,658.9" />
    
    <!-- Temple Inner Structure -->
    <line x1="240.5" y1="240.5" x2="783.5" y2="240.5" />
    <line x1="157.2" y1="365.1" x2="866.8" y2="365.1" />
    <line x1="240.5" y1="240.5" x2="512" y2="896" />
    <line x1="783.5" y1="240.5" x2="512" y2="896" />
  </g>

  <!-- Gold Octagon (Gold arcs connecting every other node) -->
  <polygon points="512,128 783.5,240.5 896,512 783.5,783.5 512,896 240.5,783.5 128,512 240.5,240.5" fill="none" stroke="#a3862a" stroke-width="2.5" stroke-opacity="0.9" filter="url(#gold-glow)" />

  <!-- Cardinal to Core connections (Gold) -->
  <g stroke="#a3862a" stroke-width="1.5" stroke-opacity="0.6">
    <line x1="512" y1="128" x2="512" y2="512" />
    <line x1="896" y1="512" x2="512" y2="512" />
    <line x1="512" y1="896" x2="512" y2="512" />
    <line x1="128" y1="512" x2="512" y2="512" />
  </g>

  <!-- Nodes -->
  <g>
    <!-- White Nodes -->
    <circle cx="658.9" cy="157.2" r="6" fill="#f1f5f9" filter="url(#white-glow)" />
    <circle cx="783.5" cy="240.5" r="6" fill="#f1f5f9" filter="url(#white-glow)" />
    <circle cx="866.8" cy="365.1" r="6" fill="#f1f5f9" filter="url(#white-glow)" />
    <circle cx="866.8" cy="658.9" r="6" fill="#f1f5f9" filter="url(#white-glow)" />
    <circle cx="783.5" cy="783.5" r="6" fill="#f1f5f9" filter="url(#white-glow)" />
    <circle cx="658.9" cy="866.8" r="6" fill="#f1f5f9" filter="url(#white-glow)" />
    <circle cx="365.1" cy="866.8" r="6" fill="#f1f5f9" filter="url(#white-glow)" />
    <circle cx="240.5" cy="783.5" r="6" fill="#f1f5f9" filter="url(#white-glow)" />
    <circle cx="157.2" cy="658.9" r="6" fill="#f1f5f9" filter="url(#white-glow)" />
    <circle cx="157.2" cy="365.1" r="6" fill="#f1f5f9" filter="url(#white-glow)" />
    <circle cx="240.5" cy="240.5" r="6" fill="#f1f5f9" filter="url(#white-glow)" />
    <circle cx="365.1" cy="157.2" r="6" fill="#f1f5f9" filter="url(#white-glow)" />

    <!-- Cardinal Nodes (Gold) -->
    <circle cx="512" cy="128" r="12" fill="#a3862a" filter="url(#gold-glow)" />
    <circle cx="896" cy="512" r="12" fill="#a3862a" filter="url(#gold-glow)" />
    <circle cx="512" cy="896" r="12" fill="#a3862a" filter="url(#gold-glow)" />
    <circle cx="128" cy="512" r="12" fill="#a3862a" filter="url(#gold-glow)" />

    <!-- Core Node (Gold) -->
    <circle cx="512" cy="512" r="18" fill="#a3862a" filter="url(#gold-glow)" />
    <circle cx="512" cy="512" r="8" fill="#f1f5f9" opacity="0.9" />
  </g>
</svg>